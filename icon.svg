<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient: Vibrant Blue to Purple-Pink -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient for Card Chip -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe082;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffb300;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Full-bleed background -->
  <rect width="512" height="512" fill="url(#bg-grad)"/>
  
  <!-- Central Glassmorphic Card -->
  <g>
    <!-- Solid card shadow (extremely compatible, doesn't break favicons) -->
    <rect x="76" y="136" width="360" height="260" rx="40" fill="#000000" fill-opacity="0.18"/>
    
    <!-- Glass card body -->
    <rect x="76" y="126" width="360" height="260" rx="40" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-opacity="0.35" stroke-width="4"/>
    
    <!-- Card Chip (Gold) -->
    <rect x="126" y="176" width="70" height="52" rx="12" fill="url(#gold-grad)"/>
    <!-- Chip details -->
    <rect x="136" y="196" width="50" height="2" fill="#000000" fill-opacity="0.2"/>
    <rect x="160" y="176" width="2" height="52" fill="#000000" fill-opacity="0.2"/>
    
    <!-- Card lines (mock text) -->
    <rect x="126" y="270" width="160" height="12" rx="6" fill="#ffffff" fill-opacity="0.45"/>
    <rect x="126" y="300" width="240" height="20" rx="6" fill="#ffffff" fill-opacity="0.3"/>
    
    <!-- Large glowing % symbol in the corner -->
    <circle cx="336" cy="216" r="48" fill="#ffffff" fill-opacity="0.25" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
    <text x="336" y="234" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Segoe UI', Roboto, sans-serif" font-size="54" font-weight="bold" fill="#ffffff" text-anchor="middle">%</text>
  </g>
</svg>
